<div class="page">
  <div class="page-header">
    <h1>Budget Management</h1>
    <button class="btn-primary" (click)="onAdd()">+ Add Budget</button>
  </div>

  <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>

  <table *ngIf="budgets.length > 0; else noData">
    <thead>
      <tr>
        <th>Category</th>
        <th>Monthly Limit</th>
        <th>Month</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of budgets">
        <td>{{ b.category }}</td>
        <td class="limit">${{ b.monthlyLimit.toFixed(2) }}</td>
        <td>{{ b.month }}</td>
        <td>
          <button class="action-btn" (click)="onEdit(b._id!)">Edit</button>
          <button class="action-btn delete" (click)="onDelete(b._id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #noData>
    <p>No budgets found.</p>
  </ng-template>
</div>
