<div>
  <h2>Transaction History</h2>

  <button (click)="onAdd()">+ Add Transaction</button>

  <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>

  <!-- Filters -->
  <div>
    <select [(ngModel)]="filterCategory" (change)="applyFilters()" name="filterCategory">
      <option value="">All Categories</option>
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>

    <select [(ngModel)]="filterType" (change)="applyFilters()" name="filterType">
      <option value="">All Types</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input type="month" [(ngModel)]="filterMonth" (change)="applyFilters()" name="filterMonth" />
  </div>

  <!-- Table -->
  <table *ngIf="filtered.length > 0; else noData">
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Note</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of filtered">
        <td>{{ t.date | date:'mediumDate' }}</td>
        <td>{{ t.type }}</td>
        <td>{{ t.category }}</td>
        <td>${{ t.amount.toFixed(2) }}</td>
        <td>{{ t.note || '—' }}</td>
        <td>
          <button (click)="onEdit(t._id!)">Edit</button>
          <button (click)="onDelete(t._id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #noData>
    <p>No transactions found.</p>
  </ng-template>
</div>
